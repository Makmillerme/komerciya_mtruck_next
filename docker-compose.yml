services:
  app:
    container_name: komerciya_mtruck_next
    image: komerciya_mtruck_next:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      INTERNAL_RENDER_URL: ${INTERNAL_RENDER_URL:-http://127.0.0.1:3000}
    volumes:
      - ./data/uploads:/app/uploads
      - ./data/output:/app/output
      - ./data/history:/app/data
      - ./data/proposal-print-temp:/app/.proposal-print-temp
